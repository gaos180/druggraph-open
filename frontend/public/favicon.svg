<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo oscuro con esquinas redondeadas -->
  <rect width="32" height="32" rx="7" fill="#0a0f1c"/>
  <!-- Aristas del grafo (primero para que queden debajo de los nodos) -->
  <line x1="16" y1="7" x2="27" y2="24" stroke="#00D4FF" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="16" y1="7" x2="5"  y2="24" stroke="#00D4FF" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="5"  y1="24" x2="27" y2="24" stroke="#22D3A0" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Nodos -->
  <circle cx="16" cy="7"  r="4.5" fill="#00D4FF"/>
  <circle cx="27" cy="24" r="4.5" fill="#22D3A0"/>
  <circle cx="5"  cy="24" r="4.5" fill="#00D4FF" opacity="0.8"/>
</svg>
